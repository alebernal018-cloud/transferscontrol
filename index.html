<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Transferencias</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #f2f2f2;
      margin: 0;
      padding: 0;
    }

    header {
      background: #161616;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #333;
      position: relative;
    }

    .top-right {
      position: absolute;
      right: 15px;
      top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-right span {
      font-size: 12px;
      color: #aaa;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-logout {
      background: #e53935;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      width: auto;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
    }

    .btn-logout:hover {
      background: #b71c1c;
    }

    .container {
      max-width: 1150px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #161616;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #333;
      margin-bottom: 20px;
    }

    h3 {
      margin-top: 0;
    }

    label {
      font-size: 13px;
      color: #ccc;
      display: block;
      margin-top: 14px;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #444;
      font-size: 14px;
      background: #222;
      color: #fff;
      outline: none;
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 45px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 25px;
      }
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 10px;
    }

    .btn-guardar {
      background: #5416DB;
      color: white;
      padding: 10px 18px;
      font-size: 14px;
      margin-top: 20px;
      width: auto;
      display: inline-block;
    }

    .btn-guardar:hover {
      background: #3f10aa;
    }

    .btn-danger {
      background: #e53935;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      width: auto;
      border-radius: 8px;
    }

    .btn-danger:hover {
      background: #b71c1c;
    }

    .btn-edit {
      background: #3949ab;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      width: auto;
      border-radius: 8px;
    }

    .btn-edit:hover {
      background: #283593;
    }

    .btn-estado {
      background: #ffffff;
      color: #000;
      padding: 6px 10px;
      font-size: 12px;
      width: auto;
      border-radius: 8px;
    }

    .btn-estado:hover {
      background: #d6d6d6;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #222;
      font-size: 12px;
      color: #ccc;
    }

    .status-aplicada {
      color: #4caf50;
      font-weight: bold;
    }

    .status-pendiente {
      color: #ffb300;
      font-weight: bold;
    }

    .status-noaplica {
      color: #9e9e9e;
      font-weight: bold;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-content {
      background: #161616;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      max-width: 820px;
      width: 100%;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .close-btn {
      background: transparent;
      border: none;
      font-size: 22px;
      color: #fff;
      cursor: pointer;
      width: auto;
    }

    .close-btn:hover {
      color: #ff5252;
    }

    .btn-cancel {
      background: #555;
      color: white;
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 10px;
      width: auto;
    }

    .btn-cancel:hover {
      background: #444;
    }

    .actions-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
  </style>
</head>

<body>

<header>
  Control de Transferencias Bancarias
  <div class="top-right" id="topRight" style="display:none;">
    <span id="userInfo"></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<div class="container">

  <div class="card" id="loginCard">
    <h3>Iniciar Sesión</h3>
    <label>Correo</label>
    <input type="email" id="email" placeholder="Correo">

    <label>Contraseña</label>
    <input type="password" id="password" placeholder="Contraseña">

    <button class="btn-guardar" onclick="login()">Ingresar</button>
  </div>

  <div id="panel" style="display:none;">

    <div class="card">
      <h3>Registrar nueva transferencia</h3>

      <div class="grid">

        <div>
          <label>Cliente</label>
          <input type="text" id="cliente" placeholder="Ej: Juan Pérez">

          <label>Monto ($)</label>
          <input type="number" id="monto" placeholder="Ej: 50.00">

          <label>Fecha recibida</label>
          <input type="date" id="fecha">

          <label>Estado</label>
          <select id="estado">
            <option value="Pendiente">Pendiente</option>
            <option value="Aplicada">Aplicada</option>
            <option value="No aplica">No aplica</option>
          </select>
        </div>

        <div>
          <label>N° Recibo</label>
          <input type="text" id="recibo" placeholder="Ej: R-000123">

          <label>Fecha recibo</label>
          <input type="date" id="fechaRecibo">

          <label>ID o Banco</label>
          <input type="text" id="banco" placeholder="Ej: BAC / Agrícola / ID interno">

          <label>Observaciones / Comentarios</label>
          <textarea id="comentarios" placeholder="Ej: nota de abono pendiente, revisar recibo, etc."></textarea>
        </div>

      </div>

      <button class="btn-guardar" onclick="guardarTransferencia()">Guardar Transferencia</button>
    </div>

    <div class="card">
      <h3>Buscar transferencias</h3>
      <input type="text" id="buscar" placeholder="Buscar por cliente, banco, recibo, estado o monto..." onkeyup="renderTabla()">
    </div>

    <div class="card">
      <h3>Listado</h3>

      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Monto</th>
            <th>Fecha Recibida</th>
            <th>Estado</th>
            <th>N° Recibo</th>
            <th>Fecha Recibo</th>
            <th>ID / Banco</th>
            <th>Observaciones</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="tablaBody"></tbody>
      </table>
    </div>

  </div>

</div>


<div class="modal" id="modalEditar">
  <div class="modal-content">

    <div class="modal-header">
      <h3>Editar Transferencia</h3>
      <button class="close-btn" onclick="cerrarModal()">✖</button>
    </div>

    <div class="grid">

      <div>
        <label>Cliente</label>
        <input type="text" id="editCliente">

        <label>Monto ($)</label>
        <input type="number" id="editMonto">

        <label>Fecha recibida</label>
        <input type="date" id="editFecha">

        <label>Estado</label>
        <select id="editEstado">
          <option value="Pendiente">Pendiente</option>
          <option value="Aplicada">Aplicada</option>
          <option value="No aplica">No aplica</option>
        </select>
      </div>

      <div>
        <label>N° Recibo</label>
        <input type="text" id="editRecibo">

        <label>Fecha recibo</label>
        <input type="date" id="editFechaRecibo">

        <label>ID o Banco</label>
        <input type="text" id="editBanco">

        <label>Observaciones / Comentarios</label>
        <textarea id="editComentarios"></textarea>
      </div>

    </div>

    <div class="actions-row">
      <button class="btn-guardar" onclick="guardarCambios()">Guardar Cambios</button>
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
    </div>

  </div>
</div>


<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDybO0X16acq4jlaOCJ2gPKs21L-zLXVbA",
    authDomain: "trasnfercontrol.firebaseapp.com",
    projectId: "trasnfercontrol",
    storageBucket: "trasnfercontrol.firebasestorage.app",
    messagingSenderId: "125048313931",
    appId: "1:125048313931:web:2b3e1609ba97057a1e15ce",
    measurementId: "G-Z4PYH91QJV"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let transferencias = [];
  let idEditando = null;

  function limpiarFormulario() {
    document.getElementById("cliente").value = "";
    document.getElementById("monto").value = "";
    document.getElementById("fecha").value = "";
    document.getElementById("estado").value = "Pendiente";
    document.getElementById("recibo").value = "";
    document.getElementById("fechaRecibo").value = "";
    document.getElementById("banco").value = "";
    document.getElementById("comentarios").value = "";
  }

  async function cargarTransferencias() {
    transferencias = [];
    const querySnapshot = await getDocs(collection(db, "transferencias"));

    querySnapshot.forEach((docu) => {
      transferencias.push({ id: docu.id, ...docu.data() });
    });

    // ORDENAR DEL MÁS ANTIGUO AL MÁS RECIENTE
    transferencias.sort((a, b) => {
      const fechaA = (a.fecha && a.fecha !== "No aplica") ? a.fecha : "9999-12-31";
      const fechaB = (b.fecha && b.fecha !== "No aplica") ? b.fecha : "9999-12-31";
      return fechaA.localeCompare(fechaB);
    });

    renderTabla();
  }

  window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("Ingresa correo y contraseña.");
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      alert("Error de login: " + error.message);
    }
  };

  window.logout = async function() {
    await signOut(auth);
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginCard").style.display = "none";
      document.getElementById("panel").style.display = "block";
      document.getElementById("topRight").style.display = "flex";
      document.getElementById("userInfo").innerText = user.email;
      cargarTransferencias();
    } else {
      document.getElementById("loginCard").style.display = "block";
      document.getElementById("panel").style.display = "none";
      document.getElementById("topRight").style.display = "none";
      document.getElementById("userInfo").innerText = "";
    }
  });

  window.guardarTransferencia = async function() {
    const cliente = document.getElementById("cliente").value.trim() || "No aplica";
    const monto = document.getElementById("monto").value.trim();
    const fecha = document.getElementById("fecha").value || "No aplica";
    const estado = document.getElementById("estado").value || "No aplica";
    const recibo = document.getElementById("recibo").value.trim() || "No aplica";
    const fechaRecibo = document.getElementById("fechaRecibo").value || "No aplica";
    const banco = document.getElementById("banco").value.trim() || "No aplica";
    const comentarios = document.getElementById("comentarios").value.trim() || "No aplica";

    const montoFinal = monto ? parseFloat(monto) : 0;

    try {
      await addDoc(collection(db, "transferencias"), {
        cliente: cliente,
        monto: montoFinal,
        fecha: fecha,
        estado: estado,
        recibo: recibo,
        fechaRecibo: fechaRecibo,
        banco: banco,
        comentarios: comentarios
      });

      limpiarFormulario();
      cargarTransferencias();
    } catch (error) {
      alert("Error al guardar: " + error.message);
    }
  };

  window.cambiarEstado = async function(id, estadoActual) {
    let nuevoEstado = "Pendiente";

    if (estadoActual === "Pendiente") nuevoEstado = "Aplicada";
    else if (estadoActual === "Aplicada") nuevoEstado = "No aplica";
    else if (estadoActual === "No aplica") nuevoEstado = "Pendiente";

    try {
      await updateDoc(doc(db, "transferencias", id), { estado: nuevoEstado });
      cargarTransferencias();
    } catch (error) {
      alert("Error al actualizar: " + error.message);
    }
  };

  window.eliminarTransferencia = async function(id) {
    if (!confirm("¿Eliminar esta transferencia?")) return;

    try {
      await deleteDoc(doc(db, "transferencias", id));
      cargarTransferencias();
    } catch (error) {
      alert("Error al eliminar: " + error.message);
    }
  };

  window.editarTransferencia = function(id) {
    const t = transferencias.find(x => x.id === id);
    if (!t) return;

    idEditando = id;

    document.getElementById("editCliente").value = t.cliente === "No aplica" ? "" : (t.cliente || "");
    document.getElementById("editMonto").value = t.monto || 0;
    document.getElementById("editFecha").value = t.fecha === "No aplica" ? "" : (t.fecha || "");
    document.getElementById("editEstado").value = t.estado || "Pendiente";

    document.getElementById("editRecibo").value = t.recibo === "No aplica" ? "" : (t.recibo || "");
    document.getElementById("editFechaRecibo").value = t.fechaRecibo === "No aplica" ? "" : (t.fechaRecibo || "");
    document.getElementById("editBanco").value = t.banco === "No aplica" ? "" : (t.banco || "");
    document.getElementById("editComentarios").value = t.comentarios === "No aplica" ? "" : (t.comentarios || "");

    document.getElementById("modalEditar").style.display = "flex";
  };

  window.cerrarModal = function() {
    document.getElementById("modalEditar").style.display = "none";
    idEditando = null;
  };

  window.guardarCambios = async function() {
    if (!idEditando) return;

    const cliente = document.getElementById("editCliente").value.trim() || "No aplica";
    const monto = document.getElementById("editMonto").value.trim();
    const fecha = document.getElementById("editFecha").value || "No aplica";
    const estado = document.getElementById("editEstado").value || "No aplica";

    const recibo = document.getElementById("editRecibo").value.trim() || "No aplica";
    const fechaRecibo = document.getElementById("editFechaRecibo").value || "No aplica";
    const banco = document.getElementById("editBanco").value.trim() || "No aplica";
    const comentarios = document.getElementById("editComentarios").value.trim() || "No aplica";

    const montoFinal = monto ? parseFloat(monto) : 0;

    try {
      await updateDoc(doc(db, "transferencias", idEditando), {
        cliente: cliente,
        monto: montoFinal,
        fecha: fecha,
        estado: estado,
        recibo: recibo,
        fechaRecibo: fechaRecibo,
        banco: banco,
        comentarios: comentarios
      });

      cerrarModal();
      cargarTransferencias();
    } catch (error) {
      alert("Error al guardar cambios: " + error.message);
    }
  };

  window.renderTabla = function() {
    const filtro = document.getElementById("buscar").value.toLowerCase();
    const tbody = document.getElementById("tablaBody");
    tbody.innerHTML = "";

    transferencias
      .filter(t =>
        (t.cliente + "").toLowerCase().includes(filtro) ||
        (t.banco + "").toLowerCase().includes(filtro) ||
        (t.recibo + "").toLowerCase().includes(filtro) ||
        (t.estado + "").toLowerCase().includes(filtro) ||
        (t.comentarios + "").toLowerCase().includes(filtro) ||
        (t.monto + "").includes(filtro)
      )
      .forEach((t) => {

        let estadoClass = "status-pendiente";
        if (t.estado === "Aplicada") estadoClass = "status-aplicada";
        if (t.estado === "No aplica") estadoClass = "status-noaplica";

        tbody.innerHTML += `
          <tr>
            <td>${t.cliente || "No aplica"}</td>
            <td>$${Number(t.monto || 0).toFixed(2)}</td>
            <td>${t.fecha || "No aplica"}</td>
            <td class="${estadoClass}">${t.estado || "No aplica"}</td>
            <td>${t.recibo || "No aplica"}</td>
            <td>${t.fechaRecibo || "No aplica"}</td>
            <td>${t.banco || "No aplica"}</td>
            <td>${t.comentarios || "No aplica"}</td>
            <td>
              <div class="table-actions">
                <button class="btn-edit" onclick="editarTransferencia('${t.id}')">Editar</button>
                <button class="btn-estado" onclick="cambiarEstado('${t.id}', '${t.estado}')">Estado</button>
                <button class="btn-danger" onclick="eliminarTransferencia('${t.id}')">Eliminar</button>
              </div>
            </td>
          </tr>
        `;
      });
  };
</script>

</body>
</html>
